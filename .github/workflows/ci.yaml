name: CI
run-name: >-
  ${{ startsWith(github.ref, 'refs/tags/')
      && format('Release {0}', github.ref_name)
      || (github.event_name == 'pull_request'
          && format(
               'PR #{0}: {1}{2}',
               github.event.number,
               github.event.pull_request.title,
               (github.event.head_commit && github.event.head_commit.message)
                 && format(' ({0})', github.event.head_commit.message) || '')
          || github.event.head_commit.message) }}

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:

jobs:
  test:
    name: Test (py${{ matrix.python }} • ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0     # get full history
          fetch-tags: true   # ensure tags are fetched

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync deps
        run: uv sync --all-extras --dev --link-mode=copy

      - name: Run linter
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest -q

  build-and-publish:
    name: Build and publish
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0           # important for setuptools-scm/hatch-vcs
          fetch-tags: true
          ref: ${{ github.ref }}   # ensure we check out the tag ref

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync deps
        run: uv sync --all-extras --dev --link-mode=copy

      - name: Build sdist and wheel
        run: uv build --sdist --wheel
      
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

      # === Success/failure status at https://api.github.com/repos/mikegoelzer/numba-instrument/commits/<tag-or-sha>/status ===
      - name: Record publish status (commit status)
        if: always()
        env:
          STATE: ${{ job.status == 'success' && 'success' || 'failure' }}
          CONTEXT: publish/numba-instrument
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload=$(jq -n --arg state "$STATE" --arg ctx "$CONTEXT" --arg url "$TARGET_URL" \
            '{state:$state, context:$ctx, description:"PyPI publish workflow", target_url:$url}')
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d "$payload"
